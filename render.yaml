services:
  - type: web
    name: salao-do-arthur-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    autoDeployTrigger: commit
    buildCommand: export DATABASE_URL="mysql://placeholder:placeholder@127.0.0.1:3306/placeholder" && npm ci --include=dev && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate:deploy && npm run start:prod
    initialDeployHook: npm run prisma:seed
    healthCheckPath: /api/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DEFAULT_TENANT_SUBDOMAIN
        value: barbearia-do-artur
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: WEB_APP_URL
        value: https://japaprp.github.io/salao-do-arthur
      - key: CORS_ORIGINS
        value: https://japaprp.github.io,https://japaprp.github.io/salao-do-arthur
      - key: ENABLE_SWAGGER
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: PASSWORD_RESET_SECRET
        generateValue: true
      - key: MERCADO_PAGO_ACCESS_TOKEN
        value: ""
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        value: ""
      - key: MERCADO_PAGO_WEBHOOK_URL
        value: ""
      - key: MOBILE_PAYMENT_RETURN_URL
        value: barbeariadoartur://payments/result
