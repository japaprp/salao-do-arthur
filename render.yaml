services:
  - type: pserv
    name: salao-do-arthur-mysql
    runtime: image
    plan: starter
    region: oregon
    image:
      url: mysql:8.4
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_DATABASE
        value: barbearia_do_artur_prod
      - key: MYSQL_USER
        value: salao_prod
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true

  - type: web
    name: salao-do-arthur-api
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    autoDeploy: true
    buildCommand: export DATABASE_URL="mysql://placeholder:placeholder@127.0.0.1:3306/placeholder" && npm ci && npm run prisma:generate && npm run build
    startCommand: export DATABASE_URL="mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:3306/${MYSQL_DATABASE}" && npm run prisma:migrate:deploy && npm run start:prod
    initialDeployHook: export DATABASE_URL="mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:3306/${MYSQL_DATABASE}" && npm run prisma:seed
    healthCheckPath: /api/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DEFAULT_TENANT_SUBDOMAIN
        value: barbearia-do-artur
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: WEB_APP_URL
        value: https://japaprp.github.io/salao-do-arthur
      - key: CORS_ORIGINS
        value: https://japaprp.github.io,https://japaprp.github.io/salao-do-arthur
      - key: ENABLE_SWAGGER
        value: "false"
      - key: LOG_LEVEL
        value: info
      - key: MYSQL_HOST
        fromService:
          name: salao-do-arthur-mysql
          type: pserv
          property: host
      - key: MYSQL_DATABASE
        value: barbearia_do_artur_prod
      - key: MYSQL_USER
        value: salao_prod
      - key: MYSQL_PASSWORD
        fromService:
          name: salao-do-arthur-mysql
          type: pserv
          envVarKey: MYSQL_PASSWORD
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: PASSWORD_RESET_SECRET
        generateValue: true
      - key: MERCADO_PAGO_ACCESS_TOKEN
        value: ""
      - key: MERCADO_PAGO_WEBHOOK_SECRET
        value: ""
      - key: MERCADO_PAGO_WEBHOOK_URL
        value: ""
      - key: MOBILE_PAYMENT_RETURN_URL
        value: barbeariadoartur://payments/result
