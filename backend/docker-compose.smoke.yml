services:
  postgres-smoke:
    image: postgres:16-alpine
    container_name: salao-postgres-smoke
    environment:
      POSTGRES_DB: salao_smoke
      POSTGRES_USER: salao
      POSTGRES_PASSWORD: salao
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salao -d salao_smoke"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - salao_postgres_smoke:/var/lib/postgresql/data

volumes:
  salao_postgres_smoke:
