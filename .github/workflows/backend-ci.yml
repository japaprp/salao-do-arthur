name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  validate:
    name: Validate backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Run validated backend specs
        run: npm test -- --runInBand auth.service.spec.ts professionals.service.spec.ts reports.service.spec.ts appointments.service.spec.ts

  smoke:
    name: Smoke client flow
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: salao_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/salao_ci
      JWT_SECRET: test_jwt_secret_for_ci_only
      REFRESH_TOKEN_SECRET: test_refresh_secret_for_ci_only
      PORT: '3100'
      BACKEND_PORT: '3100'
      CORS_ORIGINS: http://localhost:3001,http://127.0.0.1:3001
      SMOKE_API_URL: http://127.0.0.1:3100/api
      SMOKE_TENANT_SUBDOMAIN: salao-da-lu
      SMOKE_CLIENT_EMAIL: cliente.demo@salaodaluu.app
      SMOKE_CLIENT_PASSWORD: Cliente123!
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply Prisma migrations
        run: npm run prisma:migrate:deploy

      - name: Seed CI database
        run: npm run prisma:seed

      - name: Build backend
        run: npm run build

      - name: Start backend
        run: |
          nohup node dist/main > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for healthcheck
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3100/api/health/ready > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to become healthy in time."
          exit 1

      - name: Run smoke client flow
        run: npm run smoke:client-flow

      - name: Print backend log on failure
        if: failure()
        run: cat backend.log
