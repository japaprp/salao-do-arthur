name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NEXT_PUBLIC_SITE_BASE_PATH: /salao-do-arthur

jobs:
  build:
    name: Build static web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate public API URL
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          if [ -z "${NEXT_PUBLIC_API_URL}" ]; then
            echo "::error::Configure a repository variable named NEXT_PUBLIC_API_URL with the public backend URL, for example https://api.seudominio.com/api."
            exit 1
          fi

          case "${NEXT_PUBLIC_API_URL}" in
            http://localhost*|http://127.0.0.1*|https://localhost*|https://127.0.0.1*)
              echo "::error::NEXT_PUBLIC_API_URL cannot point to localhost for GitHub Pages."
              exit 1
              ;;
          esac

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build static export
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_BASE_PATH: ${{ env.NEXT_PUBLIC_SITE_BASE_PATH }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    name: Deploy static web
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
