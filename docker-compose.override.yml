version: '3.9'

# Arquivo de override para desenvolvimento local
# Este arquivo é automaticamente mesclado com docker-compose.yml

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run start:dev

  # Serviço adicional para desenvolvimento - PgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@salao.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '8080:80'
    profiles:
      - dev-tools

  # Serviço adicional para desenvolvimento - Redis Commander
  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    profiles:
      - dev-tools